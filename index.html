<title>CDS Lab - Group Meetings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #login-screen {
    text-align: center; padding: 40px;
  }
  #login-screen h1 {
    font-size: 2rem; margin-bottom: 8px; font-weight: 700;
  }
  #login-screen p {
    color: #94a3b8; margin-bottom: 32px; font-size: 0.95rem;
  }
  .login-box {
    background: #1e293b; border-radius: 16px; padding: 32px;
    max-width: 380px; margin: 0 auto;
    border: 1px solid #334155;
  }
  .login-box label {
    display: block; text-align: left; font-size: 0.85rem;
    color: #94a3b8; margin-bottom: 8px;
  }
  .login-box input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
    font-size: 1rem; margin-bottom: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #38bdf8; }
  .login-box button {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #38bdf8; color: #0f172a; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: #7dd3fc; }
  #error-msg {
    color: #f87171; font-size: 0.85rem; margin-top: 12px; display: none;
  }
  .lock-icon {
    font-size: 2.5rem; margin-bottom: 16px;
  }
  #app-container { display: none; }
</style>
</head>

    <button onclick="decrypt()">Enter</button>
    <div id="error-msg">Incorrect password. Try again.</div>
  </div>
</div>

function b64ToArr(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function decrypt() {
  const password = document.getElementById('password-input').value;
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';

  try {
    const salt = b64ToArr(ENCRYPTED.salt);
    const nonce = b64ToArr(ENCRYPTED.nonce);
    const ciphertext = b64ToArr(ENCRYPTED.ciphertext);

    // Import password as key material
    const keyMaterial = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
    );

    // Derive AES-GCM key using PBKDF2 (same params as Python)
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    // Decrypt
    const decrypted = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: nonce },
      key,
      ciphertext
    );

    const html = new TextDecoder().decode(decrypted);

    // Hide login, show app
    document.getElementById('login-screen').style.display = 'none';
    document.body.style.display = 'block';
    const container = document.getElementById('app-container');
    container.style.display = 'block';
    container.innerHTML = html;

    // Execute any scripts in the decrypted content
    const scripts = container.querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      newScript.textContent = oldScript.textContent;
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

  } catch (e) {
    errEl.style.display = 'block';
    document.getElementById('password-input').value = '';
    document.getElementById('password-input').focus();
  }
}
</script>
