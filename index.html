<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDS Lab - Group Meetings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a; color: #e2e8f0; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }
  #login-screen {
    text-align: center; padding: 40px;
  }
  #login-screen h1 {
    font-size: 2rem; margin-bottom: 8px; font-weight: 700;
  }
  #login-screen p {
    color: #94a3b8; margin-bottom: 32px; font-size: 0.95rem;
  }
  .login-box {
    background: #1e293b; border-radius: 16px; padding: 32px;
    max-width: 380px; margin: 0 auto;
    border: 1px solid #334155;
  }
  .login-box label {
    display: block; text-align: left; font-size: 0.85rem;
    color: #94a3b8; margin-bottom: 8px;
  }
  .login-box input {
    width: 100%; padding: 12px 16px; border-radius: 10px;
    border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
    font-size: 1rem; margin-bottom: 16px; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: #38bdf8; }
  .login-box button {
    width: 100%; padding: 12px; border-radius: 10px; border: none;
    background: #38bdf8; color: #0f172a; font-size: 1rem;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .login-box button:hover { background: #7dd3fc; }
  #error-msg {
    color: #f87171; font-size: 0.85rem; margin-top: 12px; display: none;
  }
  .lock-icon {
    font-size: 2.5rem; margin-bottom: 16px;
  }
</style>
</head>
<body>
<div id="login-screen">
  <div class="lock-icon">&#128274;</div>
  <h1>CDS Lab Meetings</h1>
  <p>Enter the group password to access the meeting portal</p>
  <div class="login-box">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autofocus
           onkeydown="if(event.key==='Enter')decrypt()">
    <button onclick="decrypt()">Enter</button>
    <div id="error-msg">Incorrect password. Please try again.</div>
  </div>
</div>

async function decrypt() {
  const pw = document.getElementById("password").value;
  if (!pw) return;
  try {
    const salt = Uint8Array.from(atob(ENCRYPTED.salt), c => c.charCodeAt(0));
    const nonce = Uint8Array.from(atob(ENCRYPTED.nonce), c => c.charCodeAt(0));
    const ciphertext = Uint8Array.from(atob(ENCRYPTED.ciphertext), c => c.charCodeAt(0));

    const keyMaterial = await crypto.subtle.importKey(
      "raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveBits", "deriveKey"]
    );
    const key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
      keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
    );
    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: nonce }, key, ciphertext
    );
    const html = new TextDecoder().decode(decrypted);

    // Reset body styling
    document.body.style.display = "block";
    document.body.style.alignItems = "stretch";
    document.body.style.justifyContent = "stretch";

    // Parse the HTML to separate scripts from content
    const temp = document.createElement("div");
    temp.innerHTML = html;

    // Collect all scripts in order
    const scripts = [];
    temp.querySelectorAll("script").forEach(s => {
      scripts.push({ src: s.src || "", text: s.textContent });
      s.remove();
    });

    // Set body content (without scripts)
    document.body.innerHTML = temp.innerHTML;

    // Load scripts sequentially: external ones first, then inline
    async function loadScript(scriptInfo) {
      return new Promise((resolve, reject) => {
        const el = document.createElement("script");
        if (scriptInfo.src) {
          el.src = scriptInfo.src;
          el.onload = resolve;
          el.onerror = reject;
        } else {
          el.textContent = scriptInfo.text;
          // Inline scripts execute synchronously when appended
          document.body.appendChild(el);
          resolve();
          return;
        }
        document.body.appendChild(el);
      });
    }

    for (const s of scripts) {
      await loadScript(s);
    }

  } catch(e) {
    document.getElementById("error-msg").style.display = "block";
    console.error(e);
  }
}
</script>
